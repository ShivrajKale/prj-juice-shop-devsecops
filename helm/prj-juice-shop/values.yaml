replicaCount: 1

image:
  repository: ""   # Set by CI/CD: <account-id>.dkr.ecr.<region>.amazonaws.com/juice-shop/juice-shop
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:672965014914:certificate/d94a64fc-9661-46cb-b76c-8642fb5b1390" 
    alb.ingress.kubernetes.io/healthcheck-path: /
  host: ""

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

probes:
  liveness:
    path: /
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
  readiness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3

securityContext:
  runAsNonRoot: false      # Juice Shop runs as root by default — note this in docs
  readOnlyRootFilesystem: false

networkPolicy:
  enabled: true